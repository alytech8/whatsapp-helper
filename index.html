<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#10b981" />
  <meta name="description" content="أداة الإرسال الذكي للواتساب — إرسال جماعي آمن وسريع بدون حظر" />

  <link rel="manifest" href="/manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WA Helper" />

  <link rel="icon"             href="/icon.png" type="image/png" />
  <link rel="apple-touch-icon" href="/icon.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="/icon.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="/icon.png" />

  <meta property="og:title"       content="WhatsApp Helper — Aly Tech" />
  <meta property="og:description" content="إرسال جماعي ذكي على واتساب" />
  <meta property="og:image"       content="/icon.png" />
  <meta property="og:type"        content="website" />

  <title>WhatsApp Helper — Aly Tech</title>

  <style>
    /* Critical CSS — منع وميض المحتوى غير المنسق */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Cairo', 'Noto Sans Arabic', sans-serif;
      background: #0a0f1e;
      color: #f0f6ff;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }
    #root { height: 100%; }

    /* Loading spinner */
    #splash {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #0a0f1e 0%, #111827 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      z-index: 9999; transition: opacity 0.4s;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    .splash-logo {
      width: 72px; height: 72px; border-radius: 22px;
      background: #10b981; display: flex; align-items: center; justify-content: center;
      animation: pulse 1.4s ease infinite;
    }
    .splash-logo svg { width: 36px; height: 36px; color: #fff; }
    .splash-text { font-size: 22px; font-weight: 900; color: #10b981; letter-spacing: -0.02em; }
    .splash-sub  { font-size: 12px; color: #4a6a8a; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.5); } 70% { box-shadow: 0 0 0 20px rgba(16,185,129,0); } }
  </style>
</head>
<body>
  <div id="splash">
    <div class="splash-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
    </div>
    <div class="splash-text">WhatsApp Helper</div>
    <div class="splash-sub">Aly Tech · جاري التحميل...</div>
  </div>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker
          .register('/sw.js', { scope: '/' })
          .then((reg) => {
            console.log('[App] SW registered:', reg.scope);
            reg.addEventListener('updatefound', () => {
              const worker = reg.installing;
              worker.addEventListener('statechange', () => {
                if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('[App] New SW version available');
                }
              });
            });
          })
          .catch((err) => console.warn('[App] SW registration failed:', err));
      });
    }

    // إخفاء شاشة التحميل بعد جاهزية React
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if (splash) splash.classList.add('hidden');
        setTimeout(() => splash?.remove(), 500);
      }, 800);
    });
  </script>
</body>
</html>
